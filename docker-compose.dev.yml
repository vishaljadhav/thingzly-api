version: '3.8'

# Use this for local development with hot reload
# Run: docker-compose -f docker-compose.dev.yml up

services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=thingzly
      - POSTGRES_PASSWORD=thingzly
      - POSTGRES_DB=thingzly
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thingzly"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
