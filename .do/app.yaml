# DigitalOcean App Platform Configuration
# https://docs.digitalocean.com/products/app-platform/reference/app-spec/

name: thingzly-api

services:
  - name: api
    # GitHub repository configuration
    github:
      repo: your-username/thingzly-api
      branch: main
      deploy_on_push: true

    # Build configuration
    build_command: npm ci && npm run build && npx prisma generate
    run_command: npm run db:migrate:deploy && npm start

    # Runtime environment
    environment_slug: node-js

    # Instance configuration
    instance_size_slug: basic-xxs  # $5/month - 512MB RAM, 1 vCPU
    instance_count: 1

    # HTTP configuration
    http_port: 3000

    # Health check
    health_check:
      http_path: /api/v1/health
      initial_delay_seconds: 10
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    # Environment variables
    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        value: production

      - key: PORT
        scope: RUN_TIME
        value: "3000"

      - key: HOST
        scope: RUN_TIME
        value: "0.0.0.0"

      - key: API_PREFIX
        scope: RUN_TIME
        value: /api/v1

      - key: LOG_LEVEL
        scope: RUN_TIME
        value: info

      - key: CORS_ORIGIN
        scope: RUN_TIME
        value: "*"

      # Database URL - automatically injected from the database component
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}

    # Auto-scaling (optional - for production)
    # autoscaling:
    #   min_instance_count: 1
    #   max_instance_count: 3
    #   metrics:
    #     cpu:
    #       percent: 80

# Database component
databases:
  - name: db
    engine: PG
    version: "16"
    size: db-s-1vcpu-1gb  # $15/month - Basic plan
    num_nodes: 1
    production: false  # Set to true for production (enables daily backups)

